<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tu viaje a Dublin</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <section class="trip">
      <header class="trip-header">
        <div>
          <h1>Tu viaje a Dublin</h1>
        </div>

        <div class="trip-info">
          <a href="#">Modificar</a>
          <p>3 huéspedes, 4 noches</p>
        </div>
      </header>

      <div class="trip-content">
        <article class="main-card">
            <img
                src="./assets/temple-bar.png"
                alt="The Temple bar"
            />

            <div class="card-content">
                <h2>The Temple bar</h2>

                <p class="detail">
                <img src="./assets/icon-drink.svg" alt="Icono de bebida" />
                2hrs Barra libre
                </p>

                <p class="detail">
                <img src="./assets/icon-food.svg" alt="Icono de comida" />
                Cena incluida
                </p>

                <div class="card-footer">
                <div>
                    <p class="price"><strong>$25</strong><span>USD</span></p>
                    <span>por persona</span>
                </div>

                <button type="button">Comprar</button>
                </div>
            </div>
        </article>

          <div class="extra-list">
            <article class="extra-card">
              <img src="./assets/icon-ship.svg" alt="Ship icon" />
              <div>
                <h3>Isla de Man</h3>
                <p>Todo un día abordo de nuestro ferry.</p>
              </div>
            </article>

            <article class="extra-card">
              <img src="./assets/icon-stethoscope.svg" alt="Stethoscope icon" />
              <div>
                <h3>Seguro de viaje</h3>
                <p>Cobertura por pérdida de equipaje.</p>
              </div>
            </article>

            <article class="extra-card">
              <img src="./assets/icon-passport.svg" alt="Passport icon" />
              <div>
                <h3>Trámite de pasaporte</h3>
                <p>¡Nosotros nos encargamos de todo!</p>
              </div>
            </article>
          </div>
        </div>
    </section>
  </main>
</body>
</html>
